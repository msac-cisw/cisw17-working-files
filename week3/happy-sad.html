<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Happy or Sad</title>
    <!-- Sammy Student
         Spring 2025 -->
</head>
<body>
    <header>
        <h1>How are you feeling?</h1>
    </header>
    <!-- Add buttons to click on that say:
        I'm feeling happy
        I'm feeling sad 
        Then change the image to show an image -->

    <button
    onclick="document.getElementById('happyOrSad').src='imgs/happy.png'"
    >Happy</button>
    <button
    onclick="document.getElementById('happyOrSad').src='imgs/neutral.png'"
    >Meh</button>
    <button
    onclick="document.getElementById('happyOrSad').src='imgs/sad.png'"
    >Sad</button>

    <br><br>
    
    <img id="happyOrSad" src="" width="300px">    
    
    <footer></footer>
</body>
</html>
