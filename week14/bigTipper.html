<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css"> 
    <link rel="stylesheet" href="styles.css" />
    <script src="bigTipper.js" defer></script>
    <title>Tip Big!</title>
    <!-- Sammy Student
         Spring 2025 -->
    <style>
        body {
            margin: 15% auto;
        }
    </style>
  </head>
  <body class="w3-sand">
    <header>
      <h1></h1>
    </header>
    <main class="w3-container w3-mobile">
      <!-- Create a form for the bill amount -->
       <form class="w3-container w3-card-4 w3-light-grey"
            id="amount">
            <h2>Enter the bill amount:</h2>
            <p>
                <input class="w3-input w3-border"
                id="billTotal"
                type="number" step="0.01" placeholder="0">
            </p>
            <p>
                <input class="w3-button w3-indigo"
                id="submit" type="submit" value="Tip Big!">
            </p>
       </form>
       <!-- results div -->
        <div id="results" 
            class="w3-panel w3-pale-green w3-card-4 w3-padding-large"
            style="display: none;">
        </div>

        <!-- Reload button -->
         <button style="display: none;"
                    class="w3-button w3-indigo"
                    id="startOver">
            Start Over
         </button>

    </main>
    <footer>Sammy Student – CISW 17 – Spring 2025</footer>
  </body>
</html>
