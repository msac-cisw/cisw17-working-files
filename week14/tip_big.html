<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="styles.css">
    <script src="tip_big.js" defer></script>
    <title>Tip Big</title>
    <!-- Sable Cantus
         CISW 17 -->
</head>

<body class="w3-container">
    <header class="w3-center">
        <h1>Tip Big!</h1>
    </header>
    <main>
        <!-- div to enter the bill total -->
         <div id="bill">
            <form id="amount" class="w3-container w3-card-4 w3-light-grey">
                <h1>Enter the bill amount</h1>
                <p>
                    <input class="w3-input w3-border" id="billTotal" name="billTotal"
                        type="number" step="0.01" placeholder="0">
                </p>
                <p class="w3-center">
                    <input class="w3-button w3-indigo" id="submit" type="submit"
                        value="Tip Big!">
                </p>
            </form>
         </div>

        <!-- div to display the results -->
         <div id="results" style="display: none;">
            <!-- the results will display here from JS -->
             <h2 id="displayTotals" class="w3-panel w3-pale-green w3-card-4 w3-padding">
             </h2>

            <!-- Reload button -->
             <p class="w3-center">
                 <button class="w3-button w3-green"
                    id="startOver">Start Over</button>
             </p>
         </div>

    </main>
    <footer>
    </footer>
</body>

</html>
