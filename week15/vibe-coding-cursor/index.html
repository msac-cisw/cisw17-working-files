<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding Tools 2025</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">Vibe Coding Tools 2025</h1>
        <p class="text-center text-muted mb-5">A comprehensive list of AI-powered coding tools and platforms</p>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search tools...">
                </div>
            </div>
            <div class="col-md-3">
                <select id="categoryFilter" class="form-select">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="deploymentFilter" class="form-select">
                    <option value="">All Deployment Types</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="sortBy" class="form-select">
                    <option value="vibeScore">Sort by Vibe Score</option>
                    <option value="name">Sort by Name</option>
                    <option value="launchYear">Sort by Launch Year</option>
                    <option value="pricing">Sort by Price</option>
                </select>
            </div>
        </div>

        <div class="row" id="toolsGrid">
            <!-- Cards will be populated here -->
        </div>

        <!-- Modal for detailed view -->
        <div class="modal fade" id="toolModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <!-- Detailed content will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
