      <h1>The Count Ah Ah ah Ah 🧛‍♂️</h1>

    <main>
      <!-- Content goes here -->
       <p>Open your console.</p>
       <!-- Use a script tag -->
        <script>
            // Count all the numbers from 1 to 10
            let total = 0;
            let count = 1;

            while (count <= 10) {
                total += count;
                count += 1;
            }
            console.log(total);
            // -> 55
        </script>
    </main>
