<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="styles.css" />
    <script src="sayHello.js" defer></script>
    <title>Say Hello</title>
    <!-- Sammy Student
         Spring 2025 -->
</head>

<body>
    <header>
        <h1>Say Hello</h1>
    </header>
    <main>
        <!-- Create a form that asks for your name
           Submit displays a custom greeting. -->

        <form id="say_hello" class="w3-container">
            <label>Enter your name:</label>
            <input type="text" id="name" class="w3-input">
            <br>
            <!-- Use an input box for the Submit -->
            <input type="Submit" 
                value="Say Hi" 
                class="w3-button w3-blue">
        </form>
        <br>
        <!-- Create a message block -->
        <h2 id="message"
             class="w3-panel w3-pale-green 
                    w3-border-left w3-large"></h2>



    </main>
    <footer>Sammy Student – CISW 17 – Spring 2025</footer>
</body>

</html>
