<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="styles.css">
    <script src="say_hello.js" defer></script>
    <title>Hello, Forms!</title>
    <!-- Sable Cantus

<body class="w3-container">
    <header class="w3-center w3-green">
        <h1>Say Hello Forms Example</h1>
    </header>
    <div class="w3-card-4">
    <form name="sayHello" class="w3-container w3-padding">
        <label for="yourName">Enter your name:</label>
        <input type="text" name="yourName" class="w3-input">
        <br>
        <input type="submit" value="Say Hello" class="w3-button w3-blue">
    </form>
</div>

    <!-- Add a message block -->
     <div id="message"></div>

</body>

</html>
